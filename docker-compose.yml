services:
  wardrobe-db:
    image: postgres:16
    container_name: wardrobe-db
    environment:
      POSTGRES_DB: wardrobe_db
      POSTGRES_USER: baby
      POSTGRES_PASSWORD: closet
    ports:
      - "5432:5432"
    networks:
      - babycloset-net
    volumes:
      - wardrobe_data:/var/lib/postgresql/data

  layette-db:
    image: postgres:16
    container_name: layette-db
    environment:
      POSTGRES_DB: layette_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    networks:
      - babycloset-net
    volumes:
      - layette_data:/var/lib/postgresql/data

  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - babycloset-net

  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: kafka
    ports:
      - "9092:9092"
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - babycloset-net

  wardrobe-service:
    build:
      context: ./services/wardrobe-service
    container_name: wardrobe-service
    ports:
      - "8081:8081"
    depends_on:
      - wardrobe-db
      - kafka
    networks:
      - babycloset-net

  layette-service:
    build:
      context: ./services/layette-service
    container_name: layette-service
    ports:
      - "8082:8082"
    depends_on:
      - layette-db
      - kafka
    networks:
      - babycloset-net

volumes:
  wardrobe_data:
  layette_data:

networks:
  babycloset-net:
    driver: bridge
